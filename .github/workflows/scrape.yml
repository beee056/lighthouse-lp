name: Weekly Data Scraper

on:
  schedule:
    # 毎週日曜日の深夜2時 (UTCで土曜日の17:00)
    - cron: '0 17 * * 6'
  workflow_dispatch:
    # 手動実行も可能にする

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Scraper
        run: node scripts/scraper.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git commit -m "chore(data): auto-update university data [skip ci]" || exit 0
          git push
