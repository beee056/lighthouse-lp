<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#1A2744"/>
  <!-- Lighthouse tower -->
  <rect x="13.5" y="12" width="5" height="12" rx="1.5" fill="white"/>
  <!-- Base platform -->
  <rect x="10" y="22" width="12" height="3" rx="1.5" fill="white"/>
  <!-- Beacon light (orange) -->
  <circle cx="16" cy="9" r="3.5" fill="#e55f3a"/>
  <!-- Light rays -->
  <line x1="16" y1="4.5" x2="16" y2="2.5" stroke="#e55f3a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.8" y1="5.8" x2="21.5" y2="4.2" stroke="#e55f3a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12.2" y1="5.8" x2="10.5" y2="4.2" stroke="#e55f3a" stroke-width="1.5" stroke-linecap="round"/>
</svg>
